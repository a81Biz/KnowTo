<!-- templates/tpl-step6-prioritization.html -->
<!-- Step 6: Priorización (F2) -->
<template id="tpl-step6-prioritization">
  <div id="step-6-container" class="step-container space-y-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Priorización de Intervenciones</h2>
      <p class="text-gray-500 mt-1">
        La IA priorizará las brechas y áreas de mejora identificadas en el diagnóstico,
        definiendo el orden y alcance de las intervenciones de consultoría.
      </p>
    </div>

    <!-- Badge IA -->
    <div id="context-loaded-badge" class="hidden flex items-center gap-2 bg-green-50 border border-green-200 rounded-lg px-4 py-2 text-sm text-green-800">
      <span>✓</span> <span>Sugerido por IA — puedes editar antes de generar</span>
    </div>

    <form id="form-step6" class="space-y-5" novalidate>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
          Criterios de priorización del cliente
        </label>
        <textarea name="priorityCriteria" rows="3"
          placeholder="Ej: Impacto en ventas, rapidez de implementación, bajo costo, alineación con estrategia..."
          class="input-field w-full"></textarea>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
            Número máximo de intervenciones
          </label>
          <input name="maxInterventions" type="number" min="1" max="20"
            placeholder="Ej: 5"
            class="input-field w-full" />
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
            Horizonte de tiempo (meses)
          </label>
          <input name="timeHorizon" type="number" min="1" max="60"
            placeholder="Ej: 6"
            class="input-field w-full" />
        </div>
      </div>

      <button id="btn-submit" type="submit" class="btn-primary w-full py-4 text-lg">
        ✨ Generar Priorización con IA
      </button>
    </form>

    <!-- Preview panel -->
    <div id="preview-panel" class="hidden">
      <h3 class="font-semibold text-gray-700 mb-3">📄 Priorización de Intervenciones (F2):</h3>
      <div id="document-preview"
        class="document-preview bg-gray-50 border border-gray-200 rounded-xl p-6 max-h-[500px] overflow-y-auto text-sm">
      </div>
      <div class="mt-3 flex gap-2">
        <button id="btn-copy-doc" class="btn-secondary">📋 Copiar</button>
        <button id="btn-regenerate" class="btn-green">🔄 Regenerar</button>
      </div>
    </div>
  </div>
</template>
