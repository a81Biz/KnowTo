name = "knowto-backend"
main = "src/index.ts"
compatibility_date = "2024-03-15"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "development"
# Ollama: "ollama" se resuelve via extra_hosts del docker-compose → 172.20.0.20
# En dev nativo sobreescribir con OLLAMA_URL=http://localhost:11434 en .dev.vars
OLLAMA_URL   = "http://ollama:11434"
OLLAMA_MODEL = "llama3.2:3b"

# Reglas para que wrangler empaquete los .md como módulos de texto
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[env.production]
name = "knowto-backend-production"

[env.production.vars]
ENVIRONMENT = "production"
