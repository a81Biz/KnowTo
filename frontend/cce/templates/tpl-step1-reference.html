<!-- templates/tpl-step1-reference.html -->
<!-- Step 1: Marco de Referencia (F0) + Respuestas del Cliente + Instrumentos de Diagnóstico (F1_1) -->
<!-- Flujo: muestra F0 → recopila respuestas §8 → genera 6 instrumentos -->
<template id="tpl-step1-reference">
  <div id="step-1-container" class="step-container space-y-6">

    <div>
      <h2 class="text-2xl font-bold text-gray-900">Marco de Referencia y Diagnóstico</h2>
      <p class="text-gray-500 mt-1">
        Revisa el Marco de Referencia generado, registra las respuestas del cliente a las preguntas
        de diagnóstico y genera los 6 instrumentos para el trabajo de campo.
      </p>
    </div>

    <!-- Estado: cargando -->
    <div id="step1-loading" class="text-center py-12 text-gray-400">
      <div class="w-10 h-10 border-4 border-green-900 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p>Cargando Marco de Referencia...</p>
    </div>

    <!-- Estado: listo — F0 colapsable + formulario de respuestas -->
    <div id="step1-ready" class="hidden space-y-6">

      <!-- Marco de Referencia (colapsable) -->
      <div class="border border-gray-200 rounded-xl overflow-hidden">
        <button id="btn-toggle-f0"
          class="w-full flex items-center justify-between px-4 py-3 bg-gray-50 text-left font-medium text-gray-700 hover:bg-gray-100 transition-colors">
          <span>📄 Marco de Referencia (F0) — haz clic para ver</span>
          <span id="f0-toggle-icon" class="text-gray-400 text-sm">▼</span>
        </button>
        <div id="f0-document-content"
          class="hidden document-preview bg-white px-6 py-4 max-h-[450px] overflow-y-auto text-sm border-t border-gray-200">
        </div>
      </div>

      <!-- Formulario de respuestas -->
      <div class="space-y-4">
        <div>
          <h3 class="text-lg font-semibold text-gray-800">Respuestas de la Sesión de Diagnóstico</h3>
          <p class="text-gray-500 text-sm mt-1">
            Responde las preguntas del Marco de Referencia con base en la sesión con el cliente.
            Estas respuestas guiarán los 6 instrumentos de diagnóstico.
          </p>
        </div>
        <div id="dynamic-form-container" class="space-y-4">
          <!-- Renderizado dinámicamente por Step1ReferenceController -->
        </div>
      </div>

      <button id="btn-generate-instruments" class="btn-primary w-full py-4 text-lg">
        ✨ Guardar respuestas y Generar Instrumentos
      </button>

    </div>

    <!-- Estado: instrumentos generados (preview-panel = BaseStep ID) -->
    <div id="preview-panel" class="hidden space-y-4">

      <div class="flex items-center justify-between flex-wrap gap-2">
        <h3 class="font-semibold text-gray-700">📋 Instrumentos de Diagnóstico generados:</h3>
        <div class="flex gap-2 flex-wrap">
          <button id="btn-copy-doc"
            class="px-3 py-1.5 border border-gray-300 text-gray-600 rounded-lg text-xs hover:bg-gray-50">
            📋 Copiar todo
          </button>
          <button id="btn-regenerate"
            class="px-3 py-1.5 border border-green-300 text-green-700 rounded-lg text-xs hover:bg-green-50">
            🔄 Regenerar Pipeline (Limpia outputs)
          </button>
          <button id="btn-edit-answers" class="btn-secondary text-xs">
            ✏️ Modificar respuestas
          </button>
        </div>
      </div>

      <!-- Tabs de instrumentos -->
      <div id="instrument-tabs" class="flex flex-wrap gap-2">
        <!-- Renderizado dinámicamente -->
      </div>

      <!-- Contenido del instrumento activo -->
      <div id="document-preview"
        class="document-preview bg-gray-50 border border-gray-200 rounded-xl p-6 max-h-[500px] overflow-y-auto text-sm">
      </div>

      <p class="text-xs text-gray-400 text-center">
        Los instrumentos en papel se subirán en el siguiente paso (Trabajo de Campo).
      </p>

    </div>

    <!-- Estado: error -->
    <div id="step1-error" class="hidden">
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-6 text-center">
        <p class="text-amber-700 font-medium" id="step1-error-message">
          No se pudo cargar el Marco de Referencia.
        </p>
        <p class="text-amber-600 text-sm mt-1">
          Asegúrate de haber completado el paso anterior (Datos del Cliente).
        </p>
        <button id="btn-retry-step1" class="mt-4 btn-green">
          Reintentar
        </button>
      </div>
    </div>

  </div>
</template>
