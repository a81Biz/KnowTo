<template id="tpl-step2-analysis">
  <div id="step-2-container" class="step-container space-y-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Especificaciones de Análisis y Diseño</h2>
      <p class="text-gray-500 mt-1">Revisa el perfil y los objetivos preliminares generados por la IA en base al Marco de Referencia y el Informe de Necesidades. Confirma o ajusta antes de continuar con F2.</p>
    </div>

    <!-- Resumen de entradas disponibles -->
    <div id="context-summary" class="bg-blue-50 border border-blue-200 rounded-lg p-4 space-y-1 text-sm">
      <p class="font-semibold text-blue-800 text-xs uppercase tracking-widest mb-2">Entradas del sistema</p>
      <div id="ctx-f0" class="flex items-center gap-2 text-blue-700">
        <span id="ctx-f0-icon">⏳</span>
        <span id="ctx-f0-label">Marco de Referencia (F0): verificando...</span>
      </div>
      <div id="ctx-f1" class="flex items-center gap-2 text-blue-700">
        <span id="ctx-f1-icon">⏳</span>
        <span id="ctx-f1-label">Informe de Necesidades (F1): verificando...</span>
      </div>
    </div>

    <!-- Panel: Perfil del participante editable -->
    <div id="panel-perfil" class="hidden space-y-3">
      <div class="flex items-center gap-2">
        <span class="text-lg">👤</span>
        <h3 class="font-semibold text-gray-800 text-base">Perfil del participante</h3>
        <span class="text-xs text-gray-400">(propuesto por IA en F1 — edita si es necesario)</span>
      </div>

      <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 space-y-4 text-sm">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="perfil_profesional" class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1">Perfil profesional</label>
            <input type="text" id="perfil_profesional" name="perfil_profesional"
              class="input-field w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
              placeholder="Ej: Técnico de producción industrial">
          </div>
          <div>
            <label for="nivel_educativo_minimo" class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1">Nivel educativo mínimo</label>
            <input type="text" id="nivel_educativo_minimo" name="nivel_educativo_minimo"
              class="input-field w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
              placeholder="Ej: Bachillerato técnico">
          </div>
          <div>
            <label for="conocimientos_previos_requeridos" class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1">Conocimientos previos</label>
            <input type="text" id="conocimientos_previos_requeridos" name="conocimientos_previos_requeridos"
              class="input-field w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
              placeholder="Ej: Manejo básico de computadora">
          </div>
          <div>
            <label for="rango_de_edad_estimado" class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1">Rango de edad estimado</label>
            <input type="text" id="rango_de_edad_estimado" name="rango_de_edad_estimado"
              class="input-field w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
              placeholder="Ej: 25-45 años">
          </div>
        </div>
        <div>
          <label for="experiencia_previa" class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1">Experiencia previa</label>
          <textarea id="experiencia_previa" name="experiencia_previa" rows="2"
            class="input-field w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
            placeholder="Ej: Al menos 1 año en roles de operación o manufactura"></textarea>
        </div>
        <div>
          <label for="motivacion_principal" class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-1">Motivación principal</label>
          <textarea id="motivacion_principal" name="motivacion_principal" rows="2"
            class="input-field w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
            placeholder="Ej: Obtener certificación para promoción laboral"></textarea>
        </div>
      </div>
    </div>

    <!-- Panel: Objetivos de aprendizaje preliminares -->
    <div id="panel-objetivos" class="hidden space-y-3">
      <div class="flex items-center gap-2">
        <span class="text-lg">🎯</span>
        <h3 class="font-semibold text-gray-800 text-base">Objetivos de aprendizaje preliminares</h3>
        <span class="text-xs text-gray-400">(se refinarán en F2)</span>
      </div>
      <p class="text-xs text-gray-500">Desmarca los objetivos que consideres incorrectos o irrelevantes.</p>
      <div id="objetivos-content" class="space-y-2"></div>
    </div>

    <!-- Aviso si el informe F1 aún no tiene datos estructurados (no bloquea el botón) -->
    <div id="panel-sin-informe" class="hidden bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm text-blue-700">
      <strong>Nota:</strong> El perfil y objetivos del Informe de Necesidades (F1) aún no están disponibles para previsualización.
      Puedes generar las especificaciones igualmente — la IA usará el documento F1 completo como contexto.
    </div>

    <form id="form-step2" class="space-y-5" novalidate>
      <!-- Notas adicionales opcionales -->
      <div class="group">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">
          Notas adicionales (opcional)
        </label>
        <p class="text-xs text-gray-400 mb-2">Si tienes algún requisito específico que no esté en los documentos anteriores, agrégalo aquí.</p>
        <textarea id="textarea-additional-notes" name="additionalNotes" rows="3"
          placeholder="Ej: El curso debe funcionar sin conexión a internet, los alumnos están en zonas rurales..."
          class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
      </div>

      <button id="btn-submit" type="submit"
        class="btn-primary w-full bg-blue-900 text-white py-4 px-8 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all disabled:opacity-50">
        ✨ Generar Especificaciones de Análisis
      </button>
    </form>

    <div id="preview-panel" class="hidden">
      <h3 class="font-semibold text-gray-700 mb-3">📄 Documento generado:</h3>
      <div id="document-preview" class="document-preview bg-gray-50 border border-gray-200 rounded-xl p-6 max-h-96 overflow-y-auto text-sm"></div>
      <div class="mt-3 flex gap-2">
        <button id="btn-copy-doc" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">📋 Copiar</button>
        <button id="btn-regenerate" class="px-4 py-2 border border-blue-300 text-blue-700 rounded-lg text-sm hover:bg-blue-50">🔄 Regenerar</button>
      </div>
    </div>
  </div>
</template>
