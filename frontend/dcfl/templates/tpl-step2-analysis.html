<template id="tpl-step2-analysis">
  <div id="step-2-container" class="step-container space-y-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Especificaciones de Análisis y Diseño</h2>
      <p class="text-gray-500 mt-1">El sistema generará la modalidad, interactividad, estructura temática y Perfil de Ingreso (EC0366) a partir del Marco de Referencia y el Informe de Necesidades.</p>
    </div>

    <!-- Resumen de entradas disponibles -->
    <div id="context-summary" class="bg-blue-50 border border-blue-200 rounded-lg p-4 space-y-1 text-sm">
      <p class="font-semibold text-blue-800 text-xs uppercase tracking-widest mb-2">Entradas del sistema</p>
      <div id="ctx-f0" class="flex items-center gap-2 text-blue-700">
        <span id="ctx-f0-icon">⏳</span>
        <span id="ctx-f0-label">Marco de Referencia (F0): verificando...</span>
      </div>
      <div id="ctx-f1" class="flex items-center gap-2 text-blue-700">
        <span id="ctx-f1-icon">⏳</span>
        <span id="ctx-f1-label">Informe de Necesidades (F1): verificando...</span>
      </div>
    </div>

    <form id="form-step2" class="space-y-5" novalidate>
      <!-- Notas adicionales opcionales -->
      <div class="group">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">
          Notas adicionales (opcional)
        </label>
        <p class="text-xs text-gray-400 mb-2">Si tienes algún requisito específico que no esté en los documentos anteriores, agrégalo aquí.</p>
        <textarea id="textarea-additional-notes" name="additionalNotes" rows="3"
          placeholder="Ej: El curso debe funcionar sin conexión a internet, los alumnos están en zonas rurales..."
          class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
      </div>

      <button id="btn-submit" type="submit"
        class="btn-primary w-full bg-blue-900 text-white py-4 px-8 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all disabled:opacity-50">
        ✨ Generar Especificaciones de Análisis
      </button>
    </form>

    <div id="preview-panel" class="hidden">
      <h3 class="font-semibold text-gray-700 mb-3">📄 Documento generado:</h3>
      <div id="document-preview" class="document-preview bg-gray-50 border border-gray-200 rounded-xl p-6 max-h-96 overflow-y-auto text-sm"></div>
      <div class="mt-3 flex gap-2">
        <button id="btn-copy-doc" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">📋 Copiar</button>
        <button id="btn-regenerate" class="px-4 py-2 border border-blue-300 text-blue-700 rounded-lg text-sm hover:bg-blue-50">🔄 Regenerar</button>
      </div>
    </div>
  </div>
</template>
