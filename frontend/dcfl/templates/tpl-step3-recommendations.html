<template id="tpl-step3-recommendations">
  <div id="step-3-container" class="step-container space-y-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Recomendaciones Pedagógicas de Producción</h2>
      <p class="text-gray-500 mt-1">La IA analiza el contexto del curso y genera recomendaciones basadas en investigación: qué actividades incluir, frecuencia de reportes, número de videos y duración óptima por video, con justificación bibliográfica.</p>
    </div>

    <!-- Resumen de entradas disponibles -->
    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm">
      <p class="font-semibold text-blue-800 text-xs uppercase tracking-widest mb-2">Basado en</p>
      <ul class="space-y-1 text-blue-700">
        <li>✅ Marco de Referencia (F0) — sector e industria</li>
        <li>✅ Informe de Necesidades (F1) — perfil del participante</li>
        <li>✅ Especificaciones de Análisis (F2) — modalidad, interactividad y estructura temática</li>
      </ul>
    </div>

    <!-- Qué va a generar -->
    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-sm">
      <p class="font-semibold text-amber-800 text-xs uppercase tracking-widest mb-2">La IA generará</p>
      <ul class="space-y-1 text-amber-700 list-disc list-inside">
        <li>Actividades de aprendizaje recomendadas con justificación pedagógica</li>
        <li>Métricas a reportear y frecuencia de seguimiento sugerida</li>
        <li>Número de videos recomendado y duración óptima por tipo</li>
        <li>Referencias bibliográficas (Mayer, Sweller, Guo et al., Clark & Mayer)</li>
      </ul>
      <p class="mt-2 text-amber-600 text-xs">Podrás ajustar estos valores en el siguiente paso (Especificaciones Técnicas).</p>
    </div>

    <form id="form-step3" class="space-y-5" novalidate>
      <div class="group">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">
          Preferencias o restricciones adicionales (opcional)
        </label>
        <p class="text-xs text-gray-400 mb-2">¿Hay algo específico que quieras que la IA considere? Presupuesto limitado para video, restricciones de tiempo, preferencias del cliente...</p>
        <textarea id="textarea-additional-notes" name="additionalNotes" rows="3"
          placeholder="Ej: El cliente prefiere videos cortos de máximo 5 minutos, tienen presupuesto limitado para producción de video..."
          class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
      </div>

      <button id="btn-submit" type="submit"
        class="btn-primary w-full bg-blue-900 text-white py-4 px-8 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all disabled:opacity-50">
        ✨ Generar Recomendaciones Pedagógicas
      </button>
    </form>

    <div id="preview-panel" class="hidden">
      <h3 class="font-semibold text-gray-700 mb-3">📄 Recomendaciones generadas:</h3>
      <div id="document-preview" class="document-preview bg-gray-50 border border-gray-200 rounded-xl p-6 max-h-96 overflow-y-auto text-sm"></div>
      <div class="mt-3 flex gap-2">
        <button id="btn-copy-doc" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">📋 Copiar</button>
        <button id="btn-regenerate" class="px-4 py-2 border border-blue-300 text-blue-700 rounded-lg text-sm hover:bg-blue-50">🔄 Regenerar</button>
      </div>
    </div>
  </div>
</template>
