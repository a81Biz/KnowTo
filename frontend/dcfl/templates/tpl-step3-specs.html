<template id="tpl-step3-specs">
  <div id="step-3-container" class="step-container space-y-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Especificaciones Técnicas y Duración</h2>
      <p class="text-gray-500 mt-1">Define el LMS, versión SCORM, reporteo, formatos multimedia y duración del curso.</p>
    </div>

    <!-- Badge: datos precargados desde F2.5 -->
    <div id="f25-badge" class="hidden bg-blue-50 border border-blue-200 rounded-xl p-3 flex items-center gap-2 text-sm">
      <span class="text-blue-500 text-lg flex-shrink-0">🤖</span>
      <span class="text-blue-700">Campos precargados desde las Recomendaciones Pedagógicas (F2.5). Ajusta si es necesario.</span>
    </div>

    <form id="form-step5" class="space-y-5" novalidate>

      <!-- Plataforma LMS + URL -->
      <div class="grid md:grid-cols-2 gap-4">
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
            Plataforma LMS *
          </label>
          <input id="input-lms-name" name="lmsName" type="text"
            placeholder="Ej: Moodle 4.3, TalentLMS, Canvas, Hotmart..."
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
        </div>
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
            URL del LMS
          </label>
          <input id="input-lms-url" name="lmsUrl" type="url"
            placeholder="https://mi-empresa.moodle.com"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <!-- Versión SCORM + Razón -->
      <div class="grid md:grid-cols-2 gap-4">
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
            Versión SCORM
          </label>
          <select id="select-scorm" name="scormVersion"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500">
            <option value="SCORM 1.2">SCORM 1.2 — compatibilidad máxima</option>
            <option value="SCORM 2004">SCORM 2004 — más métricas</option>
            <option value="xAPI">xAPI / Tin Can — más flexible</option>
            <option value="Sin SCORM">Sin SCORM — LMS básico</option>
          </select>
        </div>
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
            Razón de selección del LMS
          </label>
          <input id="input-platform-reason" name="platformReason" type="text"
            placeholder="Ej: Ya tienen licencia, es gratuito, lo conocen los alumnos"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <!-- Actividades a reportear -->
      <div class="group">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
          Actividades / métricas a reportear
        </label>
        <input id="input-reporting-activities" name="reportingActivities" type="text"
          placeholder="Ej: Progreso por módulo, calificaciones, tiempo invertido, intentos"
          class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Frecuencia + Videos + Duración -->
      <div class="grid md:grid-cols-3 gap-4">
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
            Frecuencia de reportes
          </label>
          <select id="select-report-frequency" name="reportFrequency"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500">
            <option value="Diaria">Diaria</option>
            <option value="Semanal" selected>Semanal</option>
            <option value="Quincenal">Quincenal</option>
            <option value="Mensual">Mensual</option>
            <option value="Por módulo">Por módulo completado</option>
          </select>
        </div>
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
            Videos (cantidad)
          </label>
          <input id="input-videos-count" name="videosCount" type="number" min="0"
            placeholder="10"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
        </div>
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">
            Duración por video (min)
          </label>
          <input id="input-video-duration" name="videoDuration" type="number" min="1"
            placeholder="6"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <button id="btn-submit" type="submit"
        class="btn-primary w-full bg-blue-900 text-white py-4 px-8 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all disabled:opacity-50">
        ✨ Generar Especificaciones Técnicas y Duración
      </button>
    </form>

    <div id="preview-panel" class="hidden">
      <div id="document-preview" class="document-preview bg-gray-50 border border-gray-200 rounded-xl p-6 max-h-96 overflow-y-auto text-sm"></div>
      <div class="mt-3 flex gap-2">
        <button id="btn-copy-doc" class="px-4 py-2 border border-gray-300 rounded-lg text-sm">📋 Copiar</button>
        <button id="btn-regenerate" class="px-4 py-2 border border-blue-300 text-blue-700 rounded-lg text-sm">🔄 Regenerar</button>
      </div>
    </div>
  </div>
</template>
