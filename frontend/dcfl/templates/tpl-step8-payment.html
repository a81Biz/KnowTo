<template id="tpl-step8-payment">
  <div id="step-9-container" class="step-container space-y-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Inventario del Expediente y Firmas (F6.2a)</h2>
      <p class="text-gray-500 mt-1">Genera el inventario de los 16 documentos del expediente EC0366 y los espacios de firma para el candidato, revisor y organismo certificador.</p>
    </div>
    <form id="form-step10" class="space-y-5" novalidate>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">CURP del candidato *</label>
          <input id="input-curp" name="candidateCurp" type="text"
            placeholder="18 caracteres — AAAA######HHHHLL##"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 uppercase"
            maxlength="18" required />
        </div>
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Organismo certificador (opcional)</label>
          <input id="input-certifier-org" name="certifierOrg" type="text"
            placeholder="Nombre del organismo certificador"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Nombre del revisor técnico (opcional)</label>
          <input id="input-reviewer-name" name="reviewerName" type="text"
            placeholder="Nombre completo del revisor"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
        </div>
        <div class="group">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Cargo del revisor (opcional)</label>
          <input id="input-reviewer-role" name="reviewerRole" type="text"
            placeholder="Ej: Evaluador EC0366, Jefe de Capacitación"
            class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>
      <div class="group">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Nombre del coordinador del proceso (opcional)</label>
        <input id="input-certifier-name" name="certifierName" type="text"
          placeholder="Nombre del coordinador del organismo certificador"
          class="input-field w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500" />
      </div>
      <button id="btn-submit" type="submit"
        class="btn-primary w-full bg-blue-900 text-white py-4 px-8 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all disabled:opacity-50">
        ✨ Generar Inventario del Expediente y Firmas
      </button>
    </form>
    <div id="preview-panel" class="hidden">
      <h3 class="font-semibold text-gray-700 mb-3">📄 Documento generado:</h3>
      <div id="document-preview" class="document-preview bg-gray-50 border border-gray-200 rounded-xl p-6 max-h-96 overflow-y-auto text-sm"></div>
      <div class="mt-3 flex gap-2">
        <button id="btn-copy-doc" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg text-sm hover:bg-gray-50">📋 Copiar</button>
        <button id="btn-regenerate" class="px-4 py-2 border border-blue-300 text-blue-700 rounded-lg text-sm hover:bg-blue-50">🔄 Regenerar</button>
      </div>
    </div>
  </div>
</template>
