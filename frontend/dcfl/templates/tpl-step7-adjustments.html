<template id="tpl-step7-adjustments">
  <div id="step-8-container" class="step-container space-y-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Ajustes Post-Evaluación</h2>
      <p class="text-gray-500 mt-1">El sistema genera un formulario personalizado basado en las observaciones de la verificación (F5). Llena los campos y genera el documento oficial de ajustes.</p>
    </div>

    <!-- Fase 1: Generar formulario dinámico -->
    <div id="form-generation-panel">
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm">
        <p class="font-semibold text-blue-800 mb-1">¿Cómo funciona?</p>
        <ol class="list-decimal list-inside space-y-1 text-blue-700">
          <li>El sistema analiza el checklist de verificación (F5) de tu proyecto.</li>
          <li>Genera un formulario específico con los campos que necesitas llenar.</li>
          <li>Tú llenas el formulario con los ajustes reales que realizaste.</li>
          <li>El sistema genera el documento formal de ajustes.</li>
        </ol>
      </div>
      <button id="btn-generate-form"
        class="mt-4 w-full bg-blue-900 text-white py-3 px-8 rounded-xl font-bold text-base hover:bg-blue-800 transition-all disabled:opacity-50">
        🔍 Analizar verificación y generar formulario
      </button>
    </div>

    <!-- Fase 2: Formulario dinámico (oculto hasta que se genere) -->
    <div id="dynamic-form-panel" class="hidden">
      <div class="mb-4">
        <h3 id="dynamic-form-title" class="text-lg font-semibold text-gray-800"></h3>
        <p id="dynamic-form-description" class="text-sm text-gray-500 mt-1"></p>
      </div>
      <form id="form-step9" class="space-y-5" novalidate>
        <!-- Campos generados dinámicamente por el controller -->
        <div id="dynamic-fields-container" class="space-y-4"></div>

        <button id="btn-submit" type="submit"
          class="btn-primary w-full bg-blue-900 text-white py-4 px-8 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all disabled:opacity-50">
          ✨ Generar Documento de Ajustes
        </button>
      </form>
    </div>

    <!-- Resultado generado -->
    <div id="preview-panel" class="hidden">
      <h3 class="font-semibold text-gray-700 mb-3">📄 Documento de Ajustes generado:</h3>
      <div id="document-preview" class="document-preview bg-gray-50 border border-gray-200 rounded-xl p-6 max-h-96 overflow-y-auto text-sm"></div>
      <div class="mt-3 flex gap-2">
        <button id="btn-copy-doc" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg text-sm hover:bg-gray-50">📋 Copiar</button>
        <button id="btn-regenerate" class="px-4 py-2 border border-blue-300 text-blue-700 rounded-lg text-sm hover:bg-blue-50">🔄 Regenerar</button>
      </div>
    </div>
  </div>
</template>
