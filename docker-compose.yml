version: '3.9'

# =============================================================================
# KNOWTO — Docker Compose (desarrollo local con arquitectura de microsites)
#
# Acceso:
#   http://localhost          → Sitio raíz (lista de microsites)
#   http://dcfl.localhost     → Microsite EC0366
#   http://api.localhost      → API Gateway
#   http://api.localhost/docs → Swagger UI (Scalar)
#
# Prerequisito (una sola vez en cada máquina):
#   Añadir al archivo hosts del sistema operativo:
#     127.0.0.1  dcfl.localhost
#     127.0.0.1  api.localhost
#
#   Windows: C:\Windows\System32\drivers\etc\hosts  (requiere admin)
#   Linux/Mac: /etc/hosts
#
# Uso:
#   docker compose up -d          → Arrancar todo
#   docker compose logs -f nginx  → Ver logs de routing
#   docker compose restart nginx  → Recargar config de nginx sin reiniciar todo
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # NGINX — Reverse proxy (ÚNICO puerto expuesto al host)
  # Enruta subdominios al frontend o backend correcto.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: knowto-nginx
    ports:
      - "80:80"          # Único puerto expuesto — todo el tráfico entra aquí
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend-dcfl
      - frontend-root
    networks:
      - knowto-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BACKEND — API Gateway (Hono + Node.js en dev, Cloudflare Workers en prod)
  # Sin puerto expuesto al host — solo accesible vía nginx en api.localhost
  # ---------------------------------------------------------------------------
  backend:
    image: node:20
    container_name: knowto-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev:debug"
    expose:
      - "8787"
      - "9229"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      PORT: "8787"
      ENVIRONMENT: development
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "llama3.2:3b"
      SUPABASE_URL: ${SUPABASE_URL:-http://postgres:5432}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-key}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-dummy-secret}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      knowto-network:
        ipv4_address: 172.20.0.30
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FRONTEND DCFL — Microsite EC0366 (Vite dev server)
  # Sin puerto expuesto al host — accesible vía nginx en dcfl.localhost
  # ---------------------------------------------------------------------------
  frontend-dcfl:
    image: node:20-alpine
    container_name: knowto-frontend-dcfl
    working_dir: /frontend/dcfl
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    expose:
      - "5173"
    volumes:
      - ./frontend:/frontend                  # frontend/ completo → /frontend/
      - frontend_dcfl_node_modules:/frontend/dcfl/node_modules
    environment:
      NODE_ENV: development
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-dummy-key}
      # VITE_API_BASE_URL no es necesaria — se resuelve en runtime desde dcfl.localhost
    depends_on:
      - backend
    networks:
      knowto-network:
        ipv4_address: 172.20.0.40
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FRONTEND ROOT — Sitio raíz / directorio de microsites
  # Sin puerto expuesto — accesible vía nginx en localhost
  # ---------------------------------------------------------------------------
  frontend-root:
    image: node:20-alpine
    container_name: knowto-frontend-root
    working_dir: /frontend/root
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    expose:
      - "5174"
    volumes:
      - ./frontend:/frontend
      - frontend_root_node_modules:/frontend/root/node_modules
    environment:
      NODE_ENV: development
    networks:
      knowto-network:
        ipv4_address: 172.20.0.50
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BASE DE DATOS
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: knowto-postgres
    environment:
      POSTGRES_USER: knowto
      POSTGRES_PASSWORD: knowto123
      POSTGRES_DB: knowto_dev
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - knowto-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowto -d knowto_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # OLLAMA (IA local)
  # Para deshabilitar: docker compose up -d --scale ollama=0
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: knowto-ollama
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull llama3.2:3b
        wait
    networks:
      knowto-network:
        ipv4_address: 172.20.0.20
    restart: unless-stopped
    # Descomenta si tienes GPU NVIDIA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  knowto-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  postgres_data:
  ollama_data:
  backend_node_modules:
  frontend_dcfl_node_modules:
  frontend_root_node_modules:
