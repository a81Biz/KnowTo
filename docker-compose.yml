version: '3.8'

# =============================================================================
# KNOWTO - Docker Compose (desarrollo local)
# Uso: docker compose up -d
# NO usar: docker-compose build (no hay Dockerfiles, se usan imágenes base)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # BASE DE DATOS
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: knowto-postgres
    environment:
      POSTGRES_USER: knowto
      POSTGRES_PASSWORD: knowto123
      POSTGRES_DB: knowto_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      knowto-network:
        ipv4_address: 172.20.0.10
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowto -d knowto_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # BACKEND (Cloudflare Worker en modo desarrollo con wrangler)
  # ---------------------------------------------------------------------------
  backend:
    image: node:20
    container_name: knowto-backend
    working_dir: /app
    # wrangler dev necesita --ip 0.0.0.0 para ser accesible desde fuera del contenedor
    # dev:debug = Node.js puro vía tsx, sin sandbox de workerd.
    # --loader ./src/md-loader.mjs: resuelve imports .md igual que wrangler [[rules]] type=Text
    # --inspect=0.0.0.0:9229: habilita el debugger de Node.js para VS Code
    command: sh -c "npm install && npm run dev:debug"
    ports:
      - "8787:8787"
      - "9229:9229"
    volumes:
      - ./backend:/app
      # Volumen nombrado para node_modules — evita conflicto con el bind mount del host
      - backend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      PORT: "8787"
      ENVIRONMENT: development
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "llama3.2:3b"
      SUPABASE_URL: ${SUPABASE_URL:-http://postgres:5432}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-key}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-dummy-secret}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      knowto-network:
        ipv4_address: 172.20.0.30
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FRONTEND (Vite dev server)
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: knowto-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:8787
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-dummy-key}
    depends_on:
      - backend
    networks:
      knowto-network:
        ipv4_address: 172.20.0.40
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OLLAMA (IA local)
  # IP fija 172.20.0.20 — referenciada en extra_hosts del backend para que
  # workerd (runtime de wrangler) pueda resolver el hostname "ollama".
  # Para deshabilitar: docker compose up -d --scale ollama=0
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: knowto-ollama
    ports:
      - "11435:11434"   # Puerto 11435 en host para no colisionar con Ollama local
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull llama3.2:3b
        wait
    networks:
      knowto-network:
        ipv4_address: 172.20.0.20
    restart: unless-stopped
    # Descomenta si tienes GPU NVIDIA:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  knowto-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  postgres_data:
  ollama_data:
  backend_node_modules:
  frontend_node_modules:
