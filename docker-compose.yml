version: '3.8'

# =============================================================================
# KNOWTO - Docker Compose (desarrollo local)
# Uso: docker compose up -d
# NO usar: docker-compose build (no hay Dockerfiles, se usan imágenes base)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # BASE DE DATOS
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: knowto-postgres
    environment:
      POSTGRES_USER: knowto
      POSTGRES_PASSWORD: knowto123
      POSTGRES_DB: knowto_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - knowto-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowto -d knowto_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # BACKEND (Cloudflare Worker en modo desarrollo con wrangler)
  # ---------------------------------------------------------------------------
  backend:
    image: node:20-alpine
    container_name: knowto-backend
    working_dir: /app
    # wrangler dev necesita --ip 0.0.0.0 para ser accesible desde fuera del contenedor
    command: >
      sh -c "npm install &&
             npx wrangler dev src/index.ts --port 8787 --ip 0.0.0.0 --local"
    ports:
      - "8787:8787"
    volumes:
      - ./backend:/app
      # Volumen nombrado para node_modules — evita conflicto con el bind mount del host
      - backend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      # Variables de entorno del Worker (sustituyen a .dev.vars en Docker)
      SUPABASE_URL: ${SUPABASE_URL:-http://postgres:5432}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-dummy-key}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-dummy-secret}
      OLLAMA_URL: http://ollama:11434
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knowto-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FRONTEND (Vite dev server)
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: knowto-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Volumen nombrado para node_modules — evita conflicto con el bind mount del host
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      # IMPORTANTE: dentro de Docker, usar el nombre del servicio, no localhost
      VITE_API_URL: http://localhost:8787
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-dummy-key}
    depends_on:
      - backend
    networks:
      - knowto-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OLLAMA (IA local — opcional, comentar si no tienes GPU o quieres Workers AI)
  # Para deshabilitar: docker compose up -d --scale ollama=0
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: knowto-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Arranca el servidor y descarga el modelo (solo la primera vez)
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull llama3.2:3b
        wait
    networks:
      - knowto-network
    restart: unless-stopped
    # Descomenta si tienes GPU NVIDIA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  knowto-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  # Volúmenes nombrados para node_modules (fix al conflicto de bind mount)
  backend_node_modules:
  frontend_node_modules: