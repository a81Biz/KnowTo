worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Logs
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  # WebSocket: Connection: upgrade solo cuando el cliente lo pide,
  # Connection: close para peticiones HTTP normales.
  # Sin este map, hardcodear "upgrade" rompe las peticiones normales
  # y causa bucles de reconexión HMR en Vite.
  map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
  }

  # Cargar configuraciones de microsites
  include /etc/nginx/conf.d/*.conf;
}
