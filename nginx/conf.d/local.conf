# nginx/conf.d/local.conf
# Routing de subdominios para desarrollo local.
#
# Prerequisito en la máquina del desarrollador (una sola vez):
#   Windows: añadir a C:\Windows\System32\drivers\etc\hosts
#   Linux/Mac: añadir a /etc/hosts
#
#   127.0.0.1  localhost
#   127.0.0.1  dcfl.localhost
#   127.0.0.1  cce.localhost
#   127.0.0.1  api.localhost
#
# Para añadir un nuevo microsite 'foo':
#   1. Copiar el bloque "DCFL frontend" y cambiar dcfl → foo, 5173 → nuevo puerto.
#   2. Añadir "127.0.0.1 foo.localhost" al archivo hosts.
#   3. Reiniciar nginx: docker compose restart nginx

# ─────────────────────────────────────────────────────────────────────────────
# SITIO RAÍZ — localhost
# Lista todos los microsites disponibles dinámicamente.
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name localhost;

  location / {
    proxy_pass         http://frontend-root:5174;
    proxy_http_version 1.1;
    proxy_buffering    off;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_read_timeout 86400;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# DCFL — dcfl.localhost
# Microsite de certificación EC0366.
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name dcfl.localhost;

  location / {
    proxy_pass         http://frontend-dcfl:5173;
    proxy_http_version 1.1;
    proxy_buffering    off;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_read_timeout 86400;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# CCE — cce.localhost
# Microsite de consultoría EC0249.
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name cce.localhost;

  location / {
    proxy_pass         http://frontend-cce:5175;
    proxy_http_version 1.1;
    proxy_buffering    off;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_read_timeout 86400;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# API — api.localhost
# Gateway único para todos los microsites.
# Rutas: /dcfl/*, /health, /openapi.json, /docs
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name api.localhost;

  location / {
    # OPTIONS: manejar el preflight CORS directamente en nginx — no pasa al backend.
    # Elimina los errores de CORS cuando el backend aún está arrancando (npm install
    # tarda ~1 min y nginx devolvería 502 sin cabeceras CORS, lo que el navegador
    # reporta como error de CORS en lugar de error de red).
    if ($request_method = OPTIONS) {
      add_header 'Access-Control-Allow-Origin'      $http_origin;
      add_header 'Access-Control-Allow-Credentials' 'true';
      add_header 'Access-Control-Allow-Methods'     'GET,POST,PUT,PATCH,DELETE,OPTIONS';
      add_header 'Access-Control-Allow-Headers'     'Content-Type,Authorization';
      add_header 'Access-Control-Max-Age'           86400;
      return 204;
    }

    # Quitar las cabeceras CORS que Hono ya pone para evitar duplicados.
    proxy_hide_header access-control-allow-origin;
    proxy_hide_header access-control-allow-credentials;
    proxy_hide_header access-control-allow-methods;
    proxy_hide_header access-control-allow-headers;
    proxy_hide_header access-control-max-age;

    # Añadir CORS a TODAS las respuestas, incluidas las de error de nginx
    # (502, 503, 504). Sin 'always', nginx omite estas cabeceras en respuestas
    # de error y el navegador reporta CORS en lugar del error real.
    add_header 'Access-Control-Allow-Origin'      $http_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Vary'                             'Origin' always;

    proxy_pass         http://backend:8787;
    proxy_http_version 1.1;
    proxy_buffering    off;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # AI generation (Ollama) puede tardar varios minutos en dev.
    proxy_read_timeout 300;
    proxy_send_timeout 300;
  }
}
